user nginx;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --- Core Security ---
    server_tokens off; # Mask Nginx version numbers in headers

    # --- Cloudflare Real IP Restoration ---
    include cloudflare.conf;
    
    # --- Rate & Connection Limiting Zones ---
    # 10m zone allocates memory for ~160,000 unique IP addresses
    limit_req_zone $binary_remote_addr zone=anti_goflood:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=anti_slowdown:10m;

    # --- Performance Tuning ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    types_hash_max_size 2048;

    # --- Gzip Compression ---
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # --- Virtual Hosts ---
    include /etc/nginx/sites-enabled/*;
}
